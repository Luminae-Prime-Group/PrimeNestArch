name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  quality-security:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: postgres_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    env:
      NODE_ENV: test
      PORT: 3000
      GLOBAL_PREFIX: api
      CORS_ORIGINS: http://localhost:3000
      TRUST_PROXY: false
      ENABLE_SNAPSHOT: false
      THROTTLE_TTL_MS: 60000
      THROTTLE_LIMIT: 100
      OTEL_ENABLED: false
      LOG_LEVEL: error
      DB_HOST: localhost
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_NAME: postgres_test
      DB_SSL: false
      DB_SSL_REJECT_UNAUTHORIZED: true
      DB_RETRY_ATTEMPTS: 1
      DB_RETRY_DELAY_MS: 500

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint:check

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npm test -- --passWithNoTests

      - name: E2E tests
        run: npm run test:e2e

      - name: Security gate (high/critical)
        run: npm run security:audit

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Gitleaks scan
        uses: gitleaks/gitleaks-action@v2
